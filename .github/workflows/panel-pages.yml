name: Publicar panel (GitHub Pages)
on:
  workflow_dispatch:
  schedule:
    - cron: "5 */3 * * *"   # cada 3h regenera y publica
permissions:
  contents: write          # para pushear a la rama gh-pages
concurrency:
  group: panel-pages
  cancel-in-progress: false
jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar deps
        run: pip install -r requirements.txt
      - name: Generar panel
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python -m predictor panel 8 --no-abrir
      - name: Preparar sitio
        run: mkdir -p _site && cp data/panel.html _site/index.html
      # Publicar por rama gh-pages (git push simple, sin la API flaky de Pages)
      - name: Publicar en gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true    # gh-pages con un solo commit (sin bloat de historia)
