name: Informe Telegram B (cola de schedule redundante)

# Workflow espejo de telegram.yml con minutos desfasados: GitHub programa
# cada workflow en colas independientes, así que tener dos duplica la
# probabilidad de que algún run caiga dentro de las ventanas cuando GitHub
# se salta crons (pasó el 2026-06-11: 2.5 h sin ejecutar nada).
# Los marcadores en data/notified/ + el mismo concurrency group evitan
# cualquier envío duplicado.

on:
  schedule:
    - cron: "14,34,54 12-23 * * *"
    - cron: "14,34,54 0-3 * * *"

concurrency:
  group: telegram
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  informe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "¿Toca enviar algún informe?"
        id: check
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          BSD_TOKEN: ${{ secrets.BSD_TOKEN }}
        run: python3 scripts/check_window.py | tee -a "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        if: steps.check.outputs.found == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        if: steps.check.outputs.found == 'true'
        run: pip install -r requirements.txt

      - name: Generar y enviar informes
        if: steps.check.outputs.found == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          BSD_TOKEN: ${{ secrets.BSD_TOKEN }}
        run: python scripts/notify_telegram.py

      - name: Persistir marcadores de envío
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notified || true
          if ! git diff --cached --quiet; then
            git commit -m "markers: $(date -u +%FT%TZ)"
            for i in 1 2 3; do
              git push && break
              git pull --rebase
            done
          fi
